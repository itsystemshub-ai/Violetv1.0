# =============================================================================
# Violet ERP - Nginx Configuration for Production
# Reverse proxy, SSL, caching, compression
# =============================================================================

upstream violet_erp {
    least_conn;
    server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3002 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP - Redirect to HTTPS
server {
    listen 80;
    server_name violet-erp.com www.violet-erp.com;
    
    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name violet-erp.com www.violet-erp.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/violet-erp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/violet-erp.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # Root
    root /var/www/violet-erp/web;
    index index.html;

    # Client settings
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_min_length 256;

    # HTTP/2 Push
    http2_push_preload on;

    # =============================================================================
    # API Reverse Proxy
    # =============================================================================
    location /api {
        proxy_pass http://violet_erp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
        proxy_connect_timeout 75;
        proxy_send_timeout 75;
        proxy_buffering off;
        
        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;
    }

    # =============================================================================
    # WebSocket Support (Socket.IO)
    # =============================================================================
    location /socket.io {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # =============================================================================
    # Frontend (Static Files)
    # =============================================================================
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Don't cache HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # =============================================================================
    # Upload Files
    # =============================================================================
    location /uploads {
        alias /var/www/violet-erp/uploads;
        expires 30d;
        add_header Cache-Control "public";
        
        # Prevent script execution
        location ~ \.(php|asp|aspx|jsp|cgi|pl|sh|py|bat|exe)$ {
            deny all;
            return 404;
        }
    }

    # =============================================================================
    # Health Check
    # =============================================================================
    location /health {
        proxy_pass http://violet_erp/health;
        access_log off;
        stub_status on;
    }

    # =============================================================================
    # Rate Limiting
    # =============================================================================
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        proxy_pass http://violet_erp;
    }

    # =============================================================================
    # Deny Access to Hidden Files
    # =============================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # =============================================================================
    # Logging
    # =============================================================================
    access_log /var/log/nginx/violet-erp-access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/violet-erp-error.log warn;
}

# =============================================================================
# Rate Limiting Zones
# =============================================================================
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# =============================================================================
# Cache Configuration
# =============================================================================
proxy_cache_path /var/cache/nginx/violet-erp levels=1:2 keys_zone=violet_cache:10m max_size=1g inactive=60m use_temp_path=off;
